# CI/CD workflow for uniform-spherical-sampling
# Runs code analysis and tests across multiple MATLAB releases

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Run code analysis (only once, on latest MATLAB)
  check:
    name: Code Analysis
    if: github.repository == 'sfu-cs-vision-lab/uniform-spherical-sampling'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025b
      - name: Run code analysis
        uses: matlab-actions/run-build@v2
        with:
          tasks: check

      - name: Upload badge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-issues-badge
          path: reports/badge/code_issues.json

  # Run tests across multiple MATLAB releases
  test:
    name: Test (MATLAB ${{ matrix.release }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: [R2022b, R2023a, R2023b, R2024a, R2024b, R2025a, R2025b]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.release }}
          products: Statistics_and_Machine_Learning_Toolbox Optimization_Toolbox

      - name: Run tests
        uses: matlab-actions/run-build@v2
        with:
          tasks: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.release }}
          path: reports/

  # Update badges after all tests complete
  update-badges:
    name: Update Badges
    needs: [check, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download code issues badge
        uses: actions/download-artifact@v4
        with:
          name: code-issues-badge
          path: reports/badge/

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-artifacts/

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025b

      - name: Generate badges
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath('buildUtilities');
            generateTestedWithBadge(["R2022b","R2023a","R2023b","R2024a","R2024b","R2025a","R2025b"]);
            % Coverage badge is generated from latest release test results
            if exist('test-artifacts/test-results-R2025b/coverage.xml', 'file')
                generateCoverageBadge('test-artifacts/test-results-R2025b/coverage.xml');
            end

      - name: Commit badge updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/badge/*.json
          git diff --staged --quiet || git commit -m "Update badges [skip ci]"
          git push
